<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <div class="sidebar">
    <button onclick="logout()">Logout</button>
    <input id="friendEmail" placeholder="Email ami">
    <button onclick="createChat()">Créer chat</button>
    <ul id="chats"></ul>
  </div>

  <div class="chat">
    <div id="messages"></div>
    <input id="msg">
    <button onclick="send()">Envoyer</button>
  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
