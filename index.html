<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Clone - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="login-page">
  <div class="card">
    <h1>WhatsApp Web Clone</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <input id="displayName" type="text" placeholder="Nom (Inscription)">

    <div class="row">
      <button id="btn-login">Se connecter</button>
      <button id="btn-register">S'inscrire</button>
    </div>

    <p style="font-size:12px;margin-top:10px;color:#555">
      Après connexion → redirection vers <b>chat.html</b>
    </p>
  </div>
</main>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
