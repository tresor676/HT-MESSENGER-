<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Messenger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Mini Messenger</h1>

    <div id="auth-area" class="card">
      <h2 id="auth-title">Connexion / Inscription</h2>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="email@example.com" />
      </div>

      <div class="form-row">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" placeholder="Mot de passe" />
      </div>
            <div class="form-row">
        <label for="repassword">Retape Votre Mot de passe</label>
        <input id="password" type="password" placeholder="Mot de passe" />
            </div>

      <div class="buttons">
        <button id="signin-btn">Se connecter</button>
        <button id="signup-btn">S'inscrire</button>
        <button id="signout-btn" class="hidden">Se déconnecter</button>
      </div>

      <p id="auth-msg" class="message"></p>
    </div>

    <div id="chat-area" class="card hidden">
      <div id="user-info">Connecté en tant que <span id="user-email"></span></div>

      <div id="messages" class="messages"></div>

      <form id="message-form" class="message-form">
        <input id="message-input" type="text" placeholder="Écrire un message..." autocomplete="off" />
        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>

  <!-- Firebase CDN (compat mode pour simplicité) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
